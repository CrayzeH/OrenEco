  <path d="M165 397 C195 388 215 370 240 355" class="line"/>
  <path d="M340 350 H410" class="line"/>

  <path d="M595 346 C645 270 655 165 670 138" class="line"/>
  <path d="M595 355 C620 330 645 285 675 260" class="line"/>
  <path d="M595 370 C625 395 650 420 680 448" class="line"/>

  <path d="M900 78 C925 105 945 145 965 220" class="line"/>
  <path d="M900 252 H965" class="line"/>
  <path d="M900 455 C925 420 945 375 965 340" class="line"/>

  <path d="M1155 240 L1225 185" class="line"/>
  <path d="M1155 285 H1230" class="line"/>
  <path d="M1420 180 L1485 220" class="line"/>
  <path d="M1420 330 L1485 305" class="line"/>

  <path d="M1695 270 C1730 300 1750 345 1760 410" class="line"/>
  <path d="M1155 330 C1320 485 1590 510 1760 455" class="line"/>
