{% extends "base.html" %}

{% block title %}Архив научных статей — OrenEco{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ========== АНИМАЦИИ ПОЯВЛЕНИЯ (параллакс эффект) ========== */
    .fade-up {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 0.8s ease forwards;
    }

    .delay-1 {
        animation-delay: 0.15s;
    }

    .delay-2 {
        animation-delay: 0.3s;
    }

    .delay-3 {
        animation-delay: 0.45s;
    }

    .delay-4 {
        animation-delay: 0.6s;
    }

    @keyframes fadeUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .articles-page {
        min-height: calc(100vh - 300px);
        background: #f7f9f7;
    }

    /* Hero Section - Full Width */
    .hero-articles {
        background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
        position: relative;
        overflow: hidden;
        padding: 5rem 2rem;
        margin-bottom: 0;
    }

    .hero-articles::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.03)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
        background-repeat: no-repeat;
        background-position: bottom;
        background-size: cover;
        opacity: 0.15;
        pointer-events: none;
    }

    .hero-container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        z-index: 2;
        text-align: center;
    }

    .hero-articles h1 {
        font-size: 3rem;
        margin-bottom: 1rem;
        font-weight: 800;
        color: white;
        letter-spacing: -0.02em;
    }

    .hero-articles p {
        font-size: 1rem;
        color: rgba(255, 255, 255, 0.85);
        max-width: 550px;
        margin: 0 auto 2.5rem;
        line-height: 1.5;
    }

    /* Search Bar inside Hero - Simplified */
    .hero-search {
        max-width: 650px;
        margin: 0 auto;
    }

    .search-container {
        background: white;
        border-radius: 60px;
        padding: 6px 6px 6px 24px;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.2);
        transition: all 0.3s ease;
    }

    .search-container:focus-within {
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.25);
        transform: translateY(-2px);
    }

    .hero-search-input {
        flex: 1;
        padding: 16px 0;
        border: none;
        font-size: 1rem;
        background: transparent;
        font-family: inherit;
        color: #1a3b1e;
    }

    .hero-search-input:focus {
        outline: none;
    }

    .hero-search-input::placeholder {
        color: #b8ceb6;
        font-weight: 400;
    }

    .hero-search-btn {
        background: #2e7d32;
        color: white;
        width: 52px;
        height: 52px;
        border: none;
        border-radius: 50%;
        cursor: pointer;
        transition: all 0.2s ease;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .hero-search-btn i {
        font-size: 1.2rem;
    }

    .hero-search-btn:hover {
        background: #1b5e20;
        transform: scale(1.02);
    }

    /* Category Filters - Full Width, No Border Radius */
    .filters-fullwidth {
        background: white;
        border-top: 1px solid #eef2f0;
        border-bottom: 1px solid #eef2f0;
        padding: 1rem 2rem;
        margin-bottom: 2.5rem;
    }

    .filters-container {
        max-width: 1200px;
        margin: 0 auto;
    }

    .category-filters {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        justify-content: center;
    }

    .category-btn {
        background: transparent;
        padding: 8px 24px;
        border-radius: 40px;
        border: none;
        cursor: pointer;
        transition: all 0.2s ease;
        font-size: 0.85rem;
        font-weight: 500;
        color: #5a7a5c;
        font-family: inherit;
    }

    .category-btn:hover {
        background: #eef5ec;
        color: #2e7d32;
    }

    .category-btn.active {
        background: #2e7d32;
        color: white;
    }

    /* Content Container */
    .articles-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 2rem 3rem;
    }

    /* Articles Grid */
    .articles-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 1.75rem;
    }

    /* Article Card */
    .article-card {
        background: white;
        border-radius: 24px;
        overflow: hidden;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid #eef2f0;
        cursor: pointer;
    }

    .article-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 28px rgba(0, 0, 0, 0.08);
        border-color: #d4e4d0;
    }

    .article-image {
        height: 180px;
        background: linear-gradient(135deg, #e8f3e6, #d4e8d0);
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 3rem;
        color: #2e7d32;
    }

    .article-category {
        position: absolute;
        top: 1rem;
        left: 1rem;
        background: rgba(0, 0, 0, 0.65);
        backdrop-filter: blur(8px);
        padding: 4px 12px;
        border-radius: 100px;
        font-size: 0.7rem;
        color: white;
        font-weight: 500;
        letter-spacing: 0.3px;
    }

    .article-content {
        padding: 1.5rem;
    }

    .article-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: #1a3b1e;
        margin-bottom: 0.75rem;
        line-height: 1.4;
    }

    .article-summary {
        color: #6a7e6c;
        font-size: 0.85rem;
        line-height: 1.5;
        margin-bottom: 1rem;
    }

    .article-meta {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.75rem;
        color: #9aae9c;
        padding-top: 1rem;
        border-top: 1px solid #eef2f0;
    }

    .article-author {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .article-author i {
        font-size: 0.7rem;
    }

    .article-stats {
        display: flex;
        gap: 1rem;
    }

    .article-stats span {
        display: flex;
        align-items: center;
        gap: 5px;
    }

    .article-stats i {
        font-size: 0.7rem;
    }

    /* Create Button */
    .create-btn {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: #2e7d32;
        color: white;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 6px 16px rgba(46, 125, 50, 0.3);
        transition: all 0.2s ease;
        z-index: 100;
        border: none;
    }

    .create-btn i {
        font-size: 1.3rem;
    }

    .create-btn:hover {
        background: #1b5e20;
        transform: scale(1.05);
        box-shadow: 0 8px 24px rgba(46, 125, 50, 0.4);
    }

    /* Empty State */
    .empty-state {
        text-align: center;
        padding: 3rem;
        grid-column: 1/-1;
        background: white;
        border-radius: 24px;
        border: 1px solid #eef2f0;
    }

    .empty-icon {
        font-size: 3rem;
        color: #c8dec6;
        margin-bottom: 1rem;
    }

    .empty-state p {
        color: #9aae9c;
        margin-bottom: 0.5rem;
    }

    .empty-state .sub {
        font-size: 0.85rem;
        color: #b8ceb6;
    }

    /* Loading State */
    .loading-state {
        text-align: center;
        padding: 3rem;
        grid-column: 1/-1;
    }

    .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e8ede6;
        border-top-color: #2e7d32;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
        .hero-articles {
            padding: 3rem 1rem;
        }

        .hero-articles h1 {
            font-size: 2rem;
        }

        .hero-articles p {
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .search-container {
            background: white;
            padding: 4px 4px 4px 20px;
            gap: 8px;
        }

        .hero-search-input {
            padding: 12px 0;
            font-size: 0.9rem;
        }

        .hero-search-btn {
            width: 44px;
            height: 44px;
        }

        .hero-search-btn i {
            font-size: 1rem;
        }

        .filters-fullwidth {
            padding: 0.75rem 1rem;
        }

        .articles-container {
            padding: 0 1rem 2rem;
        }

        .articles-grid {
            grid-template-columns: 1fr;
            gap: 1.25rem;
        }

        .create-btn {
            width: 48px;
            height: 48px;
            bottom: 1rem;
            right: 1rem;
        }

        .create-btn i {
            font-size: 1.1rem;
        }

        .category-btn {
            padding: 6px 16px;
            font-size: 0.75rem;
        }
    }

    @media (max-width: 480px) {
        .hero-articles h1 {
            font-size: 1.6rem;
        }

        .category-btn {
            padding: 5px 12px;
            font-size: 0.7rem;
        }

        .search-container {
            padding: 4px 4px 4px 16px;
        }
    }
</style>

<div class="articles-page">
    <!-- Hero Section with Search -->
    <div class="hero-articles">
        <div class="hero-container">
            <h1 class="fade-up">Архив научных статей</h1>
            <p class="fade-up delay-1">Актуальные исследования в области экологии, ОВОС и охраны окружающей среды</p>

            <div class="hero-search fade-up delay-2">
                <div class="search-container">
                    <input type="text" class="hero-search-input" id="search-input" placeholder="Поиск статей по названию, аннотации или ключевым словам...">
                    <button class="hero-search-btn" id="search-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Category Filters - Full Width -->
    <div class="filters-fullwidth fade-up delay-3">
        <div class="filters-container">
            <div class="category-filters" id="category-filters">
                <button class="category-btn active" data-category="all">Все</button>
                <button class="category-btn" data-category="ОВОС">ОВОС</button>
                <button class="category-btn" data-category="Загрязнение">Загрязнение</button>
                <button class="category-btn" data-category="Экология">Экология</button>
                <button class="category-btn" data-category="Лесное хозяйство">Лесное хозяйство</button>
            </div>
        </div>
    </div>

    <!-- Articles Grid -->
    <div class="articles-container">
        <div class="articles-grid" id="articles-grid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Загрузка статей...</p>
            </div>
        </div>
    </div>

    <!-- Create Article Button -->
    <button class="create-btn" id="create-btn" style="display: none;">
        <i class="fas fa-plus"></i>
    </button>
</div>

<script>
    let currentCategory = 'all';
    let currentSearch = '';
    let currentUserRole = null;

    const categoryIcons = {
        'ОВОС': 'fas fa-chart-line',
        'Загрязнение': 'fas fa-industry',
        'Экология': 'fas fa-leaf',
        'Лесное хозяйство': 'fas fa-tree'
    };

    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            const data = await response.json();
            if (data.authenticated) {
                currentUserRole = data.role;
                if (data.role === 'expert' || data.role === 'admin') {
                    document.getElementById('create-btn').style.display = 'flex';
                }
            }
            return data.authenticated;
        } catch (err) {
            console.error('Auth error:', err);
            return false;
        }
    }

    async function loadArticles() {
        const grid = document.getElementById('articles-grid');
        grid.innerHTML = `
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Загрузка статей...</p>
            </div>
        `;

        let url = '/api/articles';
        const params = [];
        if (currentCategory !== 'all') params.push(`category=${encodeURIComponent(currentCategory)}`);
        if (currentSearch) params.push(`search=${encodeURIComponent(currentSearch)}`);
        if (params.length) url += '?' + params.join('&');

        try {
            const response = await fetch(url);
            const articles = await response.json();

            if (articles.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state fade-up">
                        <div class="empty-icon">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <p>Статьи не найдены</p>
                        <p class="sub">Попробуйте изменить параметры поиска</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = articles.map((article, index) => `
                <div class="article-card fade-up delay-${Math.min(index % 4 + 1, 4)}" onclick="window.location.href='/article/${article.id}'">
                    <div class="article-image">
                        <i class="${categoryIcons[article.category] || 'fas fa-file-alt'}"></i>
                        <span class="article-category">${escapeHtml(article.category)}</span>
                    </div>
                    <div class="article-content">
                        <div class="article-title">${escapeHtml(article.title)}</div>
                        <div class="article-summary">${escapeHtml(article.summary.substring(0, 120))}${article.summary.length > 120 ? '...' : ''}</div>
                        <div class="article-meta">
                            <div class="article-author">
                                <i class="fas fa-user"></i>
                                <span>${escapeHtml(article.author_name)}</span>
                            </div>
                            <div class="article-stats">
                                <span><i class="fas fa-eye"></i> ${article.views}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            console.error('Ошибка загрузки статей:', err);
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <p>Ошибка загрузки статей</p>
                    <p class="sub">Попробуйте обновить страницу</p>
                </div>
            `;
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Category filter handlers
    document.querySelectorAll('.category-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = btn.dataset.category;
            loadArticles();
        });
    });

    // Search handlers
    document.getElementById('search-btn').addEventListener('click', () => {
        currentSearch = document.getElementById('search-input').value.trim();
        loadArticles();
    });

    document.getElementById('search-input').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            currentSearch = e.target.value.trim();
            loadArticles();
        }
    });

    // Create article button
    document.getElementById('create-btn').addEventListener('click', () => {
        window.location.href = '/create-article';
    });

    // Initialize
    checkAuth();
    loadArticles();
</script>
{% endblock %}
