{% extends "base.html" %}

{% block title %}Статья — OrenEco{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    /* ========== АНИМАЦИИ ПОЯВЛЕНИЯ (параллакс эффект) ========== */
    .fade-up {
        opacity: 0;
        transform: translateY(30px);
        animation: fadeUp 0.8s ease forwards;
    }

    .delay-1 {
        animation-delay: 0.15s;
    }

    .delay-2 {
        animation-delay: 0.3s;
    }

    .delay-3 {
        animation-delay: 0.45s;
    }

    .delay-4 {
        animation-delay: 0.6s;
    }

    @keyframes fadeUp {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .article-page {
        min-height: calc(100vh - 300px);
        background: #f5f7f5;
    }

    .article-hero {
        background: linear-gradient(135deg, #1a472a 0%, #0d2818 100%);
        position: relative;
        overflow: hidden;
        padding: 3rem 2rem;
        margin-bottom: 2rem;
    }

    .article-hero::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.03)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>');
        background-repeat: no-repeat;
        background-position: bottom;
        background-size: cover;
        opacity: 0.1;
        pointer-events: none;
    }

    .hero-container {
        max-width: 900px;
        margin: 0 auto;
        position: relative;
        z-index: 2;
    }

    .back-link {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
        transition: all 0.2s ease;
    }

    .back-link:hover {
        color: white;
        transform: translateX(-4px);
    }

    .article-category-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(8px);
        padding: 5px 14px;
        border-radius: 100px;
        font-size: 0.75rem;
        font-weight: 500;
        color: #c8e6c9;
        margin-bottom: 1rem;
    }

    .article-hero h1 {
        font-size: 2.5rem;
        font-weight: 800;
        color: white;
        margin-bottom: 1rem;
        line-height: 1.3;
        letter-spacing: -0.02em;
    }

    .article-meta-hero {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid rgba(255, 255, 255, 0.15);
    }

    .article-author-info {
        display: flex;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }

    .author-avatar {
        width: 40px;
        height: 40px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .author-avatar i {
        font-size: 1.2rem;
        color: #c8e6c9;
    }

    .author-details {
        display: flex;
        flex-direction: column;
    }

    .author-name {
        font-size: 0.85rem;
        font-weight: 600;
        color: white;
    }

    .article-date {
        font-size: 0.7rem;
        color: rgba(255, 255, 255, 0.6);
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .views-stat {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.1);
        padding: 5px 12px;
        border-radius: 100px;
        font-size: 0.8rem;
        color: rgba(255, 255, 255, 0.9);
    }

    .views-stat i {
        font-size: 0.75rem;
    }

    /* Main Content */
    .article-container {
        max-width: 900px;
        margin: 0 auto;
        padding: 0 2rem 3rem;
    }

    .article-card {
        background: white;
        border-radius: 28px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        border: 1px solid #eef2f0;
    }

    .summary-block {
        background: #fafdf9;
        padding: 1.75rem;
        margin: 1.5rem 1.5rem 0;
        border-radius: 20px;
        border-left: 4px solid #2e7d32;
    }

    .summary-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        color: #1a3b1e;
        margin-bottom: 0.75rem;
    }

    .summary-title i {
        color: #2e7d32;
    }

    .summary-text {
        color: #4a6e4c;
        line-height: 1.6;
        font-size: 0.9rem;
    }

    .article-body {
        padding: 1.5rem;
        line-height: 1.8;
        color: #2c3e2a;
    }

    .article-body h2 {
        color: #1a3b1e;
        font-size: 1.4rem;
        margin-top: 1.5rem;
        margin-bottom: 1rem;
        font-weight: 600;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid #eef2f0;
    }

    .article-body h3 {
        color: #2e7d32;
        font-size: 1.1rem;
        margin-top: 1.25rem;
        margin-bottom: 0.75rem;
        font-weight: 600;
    }

    .article-body p {
        margin-bottom: 1rem;
        font-size: 0.95rem;
    }

    .article-body ul, .article-body ol {
        margin-bottom: 1rem;
        padding-left: 1.5rem;
    }

    .article-body li {
        margin-bottom: 0.5rem;
        font-size: 0.95rem;
    }

    .article-body img {
        max-width: 100%;
        border-radius: 16px;
        margin: 1rem 0;
    }

    .article-body blockquote {
        border-left: 3px solid #2e7d32;
        margin: 1rem 0;
        color: #5a7a5c;
        font-style: italic;
        background: #fafdf9;
        padding: 1rem;
        border-radius: 16px;
    }

    .keywords-section {
        padding: 0 1.5rem 1.5rem;
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        border-top: 1px solid #eef2f0;
        margin-top: 0.5rem;
        padding-top: 1.5rem;
    }

    .keyword {
        background: #f5f8f4;
        padding: 5px 14px;
        border-radius: 100px;
        font-size: 0.7rem;
        color: #4a6e4c;
        font-weight: 500;
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }

    .keyword i {
        font-size: 0.65rem;
    }

    .comments-section {
        padding: 1.5rem;
        background: #fafdf9;
        border-top: 1px solid #eef2f0;
    }

    .comments-header {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 1.5rem;
    }

    .comments-header i {
        font-size: 1.2rem;
        color: #2e7d32;
    }

    .comments-header h3 {
        font-size: 1rem;
        font-weight: 600;
        color: #1a3b1e;
        margin: 0;
    }

    .comments-count {
        background: #e8ede6;
        padding: 2px 10px;
        border-radius: 100px;
        font-size: 0.7rem;
        color: #4a6e4c;
    }

    .comment-form {
        margin-bottom: 1.5rem;
    }

    .comment-form textarea {
        width: 100%;
        padding: 14px;
        border: 1px solid #e0e8e0;
        border-radius: 20px;
        resize: vertical;
        min-height: 100px;
        margin-bottom: 1rem;
        font-family: inherit;
        font-size: 0.85rem;
        transition: all 0.2s ease;
        background: white;
    }

    .comment-form textarea:focus {
        outline: none;
        border-color: #2e7d32;
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.08);
    }

    .comment-btn {
        background: #2e7d32;
        color: white;
        padding: 10px 24px;
        border: none;
        border-radius: 100px;
        cursor: pointer;
        font-weight: 600;
        font-size: 0.8rem;
        transition: all 0.2s ease;
        display: inline-flex;
        align-items: center;
        gap: 8px;
    }

    .comment-btn i {
        font-size: 0.75rem;
    }

    .comment-btn:hover {
        background: #1b5e20;
        transform: translateY(-1px);
    }

    .comments-list {
        display: flex;
        flex-direction: column;
        gap: 1rem;
    }

    .comment {
        background: white;
        padding: 1rem 1.25rem;
        border-radius: 20px;
        border: 1px solid #eef2f0;
        transition: all 0.2s ease;
    }

    .comment:hover {
        border-color: #d4e4d0;
    }

    .comment-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }

    .comment-author {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .comment-author i {
        color: #2e7d32;
        font-size: 0.8rem;
    }

    .comment-author span {
        font-weight: 600;
        color: #1a3b1e;
        font-size: 0.85rem;
    }

    .comment-date {
        font-size: 0.65rem;
        color: #9aae9c;
        display: flex;
        align-items: center;
        gap: 4px;
    }

    .comment-text {
        color: #4a6e4c;
        line-height: 1.5;
        font-size: 0.85rem;
    }

    .empty-comments {
        text-align: center;
        padding: 2rem;
        color: #9aae9c;
    }

    .empty-comments i {
        font-size: 2rem;
        margin-bottom: 0.5rem;
        display: block;
    }

    .auth-warning {
        background: #fff8e7;
        padding: 1rem;
        border-radius: 20px;
        text-align: center;
        margin-bottom: 1.5rem;
        border: 1px solid #ffe8cc;
        font-size: 0.8rem;
    }

    .auth-warning a {
        color: #2e7d32;
        font-weight: 600;
        text-decoration: none;
    }

    .auth-warning a:hover {
        text-decoration: underline;
    }

    .loading-state, .error-state {
        text-align: center;
        padding: 3rem;
        background: white;
        border-radius: 28px;
        border: 1px solid #eef2f0;
    }

    .loading-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #e8ede6;
        border-top-color: #2e7d32;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 1rem;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .error-icon {
        font-size: 3rem;
        color: #c8dec6;
        margin-bottom: 1rem;
    }

    .error-state a {
        color: #2e7d32;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-top: 1rem;
    }

    @media (max-width: 768px) {
        .article-hero {
            padding: 2rem 1rem;
        }

        .article-hero h1 {
            font-size: 1.6rem;
        }

        .article-container {
            padding: 0 1rem 2rem;
        }

        .summary-block {
            margin: 1rem 1rem 0;
            padding: 1.25rem;
        }

        .article-body {
            padding: 1.25rem;
        }

        .keywords-section {
            padding: 0 1.25rem 1.25rem;
        }

        .comments-section {
            padding: 1.25rem;
        }

        .article-meta-hero {
            flex-direction: column;
            align-items: flex-start;
        }
    }
</style>

<div class="article-page">
    <div class="article-hero" id="article-hero">
        <div class="hero-container">
            <a href="/articles" class="back-link fade-up">
                <i class="fas fa-arrow-left"></i>
                <span>К списку статей</span>
            </a>
            <div id="hero-content">
                <div class="loading-state" style="background: transparent; padding: 2rem;">
                    <div class="loading-spinner"></div>
                    <p style="color: white; margin-top: 1rem;">Загрузка...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="article-container">
        <div class="article-card" id="article-card">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Загрузка статьи...</p>
            </div>
        </div>
    </div>
</div>

<script>
    const articleId = {{ article_id }};
    let currentUser = null;

    async function checkAuth() {
        try {
            const response = await fetch('/api/current-user');
            const data = await response.json();
            if (data.authenticated) {
                currentUser = data;
            }
            return data.authenticated;
        } catch (err) {
            console.error('Auth error:', err);
            return false;
        }
    }

    async function loadArticle() {
        await checkAuth();

        try {
            const response = await fetch(`/api/articles/${articleId}`);
            const article = await response.json();

            if (article.error) {
                document.getElementById('hero-content').innerHTML = `
                    <div class="error-state" style="background: transparent;">
                        <div class="error-icon">
                            <i class="fas fa-book-open"></i>
                        </div>
                        <p style="color: white;">${article.error}</p>
                    </div>
                `;
                document.getElementById('article-card').innerHTML = `
                    <div class="error-state">
                        <div class="error-icon">
                            <i class="fas fa-exclamation-triangle"></i>
                        </div>
                        <p>Статья не найдена</p>
                        <a href="/articles">
                            <i class="fas fa-arrow-left"></i>
                            <span>Вернуться к списку</span>
                        </a>
                    </div>
                `;
                return;
            }

            renderHero(article);
            renderContent(article);
        } catch (err) {
            console.error('Ошибка:', err);
            document.getElementById('article-card').innerHTML = `
                <div class="error-state">
                    <div class="error-icon">
                        <i class="fas fa-exclamation-triangle"></i>
                    </div>
                    <p>Ошибка загрузки статьи</p>
                    <a href="/articles">
                        <i class="fas fa-arrow-left"></i>
                        <span>Вернуться к списку</span>
                    </a>
                </div>
            `;
        }
    }

    function formatViews(views) {
        if (views >= 1000) {
            return (views / 1000).toFixed(1) + 'k';
        }
        return views.toString();
    }

    function renderHero(article) {
        const authors = Array.isArray(article.authors) ? article.authors.join(', ') : article.authors;
        const date = new Date(article.created_at).toLocaleDateString('ru-RU', {
            year: 'numeric',
            month: 'long',
            day: 'numeric'
        });

        const heroHtml = `
            <div class="article-category-badge fade-up">
                <i class="fas fa-folder"></i>
                <span>${escapeHtml(article.category)}</span>
            </div>
            <h1 class="fade-up delay-1">${escapeHtml(article.title)}</h1>
            <div class="article-meta-hero fade-up delay-2">
                <div class="article-author-info">
                    <div class="author-avatar">
                        <i class="fas fa-user-graduate"></i>
                    </div>
                    <div class="author-details">
                        <span class="author-name">${escapeHtml(authors)}</span>
                        <span class="article-date">
                            <i class="fas fa-calendar-alt"></i>
                            ${date}
                        </span>
                    </div>
                </div>
                <div class="views-stat">
                    <i class="fas fa-eye"></i>
                    <span>${formatViews(article.views)} просмотров</span>
                </div>
            </div>
        `;

        document.getElementById('hero-content').innerHTML = heroHtml;
    }

    function renderContent(article) {
        const commentFormHtml = currentUser ? `
            <div class="comment-form fade-up">
                <textarea id="comment-text" placeholder="Поделитесь своим мнением о статье..."></textarea>
                <button class="comment-btn" id="submit-comment">
                    <i class="fas fa-paper-plane"></i>
                    <span>Отправить</span>
                </button>
            </div>
        ` : `
            <div class="auth-warning fade-up">
                <i class="fas fa-lock"></i>
                Чтобы оставить комментарий, <a href="/login">войдите</a> или <a href="/register">зарегистрируйтесь</a>
            </div>
        `;

        const commentsHtml = article.comments && article.comments.length > 0 ?
            article.comments.map((comment, index) => `
                <div class="comment fade-up delay-${Math.min(index % 4 + 1, 4)}">
                    <div class="comment-header">
                        <div class="comment-author">
                            <i class="fas fa-user-circle"></i>
                            <span>${escapeHtml(comment.username)}</span>
                        </div>
                        <div class="comment-date">
                            <i class="fas fa-calendar-alt"></i>
                            ${new Date(comment.created_at).toLocaleDateString('ru-RU')}
                        </div>
                    </div>
                    <div class="comment-text">${escapeHtml(comment.comment)}</div>
                </div>
            `).join('') :
            `<div class="empty-comments fade-up">
                <i class="fas fa-comment-dots"></i>
                <p>Пока нет комментариев. Будьте первым!</p>
            </div>`;

        const html = `
            <div class="summary-block fade-up">
                <div class="summary-title">
                    <i class="fas fa-align-left"></i>
                    <span>Аннотация</span>
                </div>
                <div class="summary-text">${escapeHtml(article.summary)}</div>
            </div>

            <div class="article-body fade-up delay-1">
                ${article.content}
            </div>

            <div class="keywords-section fade-up delay-2">
                ${article.keywords && article.keywords.length > 0 ? article.keywords.map(k => `<span class="keyword"><i class="fas fa-tag"></i>${escapeHtml(k)}</span>`).join('') : '<span class="keyword">Нет ключевых слов</span>'}
            </div>

            <div class="comments-section fade-up delay-3">
                <div class="comments-header">
                    <i class="fas fa-comments"></i>
                    <h3>Комментарии</h3>
                    <span class="comments-count">${article.comments ? article.comments.length : 0}</span>
                </div>

                ${commentFormHtml}

                <div class="comments-list" id="comments-list">
                    ${commentsHtml}
                </div>
            </div>
        `;

        document.getElementById('article-card').innerHTML = html;

        document.getElementById('submit-comment')?.addEventListener('click', async () => {
            if (!currentUser) {
                alert('Войдите, чтобы оставить комментарий');
                window.location.href = '/login';
                return;
            }

            const comment = document.getElementById('comment-text').value;
            if (!comment.trim()) {
                alert('Введите комментарий');
                return;
            }

            const response = await fetch(`/api/articles/${articleId}/comment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ comment: comment.trim() })
            });

            if (response.ok) {
                document.getElementById('comment-text').value = '';
                loadArticle();
            } else {
                alert('Ошибка отправки комментария');
            }
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    loadArticle();
</script>
{% endblock %}
