{% extends "base.html" %}

{% block title %}Вход — OrenEco{% endblock %}

{% block content %}
<style>
    .auth-container {
        min-height: calc(100vh - 300px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 4rem 2rem;
        background: linear-gradient(135deg, #f5f7fa 0%, #e8f5e9 100%);
    }
    
    .auth-card {
        background: white;
        border-radius: 24px;
        padding: 2.5rem;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        width: 100%;
        max-width: 450px;
        animation: fadeInUp 0.6s ease-out;
    }
    
    .auth-card h2 {
        color: #2e7d32;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
        text-align: center;
    }
    
    .auth-subtitle {
        text-align: center;
        color: #666;
        margin-bottom: 2rem;
        font-size: 0.9rem;
    }
    
    .form-group {
        margin-bottom: 1.5rem;
    }
    
    .form-group label {
        display: block;
        margin-bottom: 0.5rem;
        color: #333;
        font-weight: 500;
        font-size: 0.9rem;
    }
    
    .form-group input {
        width: 100%;
        padding: 12px 16px;
        border: 2px solid #e0e0e0;
        border-radius: 12px;
        font-size: 1rem;
        transition: all 0.3s ease;
    }
    
    .form-group input:focus {
        outline: none;
        border-color: #2e7d32;
        box-shadow: 0 0 0 3px rgba(46, 125, 32, 0.1);
    }
    
    .btn-auth {
        width: 100%;
        background: linear-gradient(135deg, #2e7d32, #1b5e20);
        color: white;
        padding: 12px;
        border: none;
        border-radius: 12px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
    }
    
    .btn-auth:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(46, 125, 50, 0.3);
    }
    
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 1px solid #e0e0e0;
    }
    
    .auth-footer a {
        color: #2e7d32;
        text-decoration: none;
        font-weight: 500;
    }
    
    .auth-footer a:hover {
        text-decoration: underline;
    }
    
    .error-message {
        background: #ffebee;
        color: #c62828;
        padding: 12px;
        border-radius: 12px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        display: none;
    }
    
    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(30px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="auth-container">
    <div class="auth-card">
        <h2>Вход в аккаунт</h2>
        <p class="auth-subtitle">Войдите, чтобы участвовать в экологической экспертизе</p>
        
        <div class="error-message" id="error-message"></div>
        
        <form id="login-form">
            <div class="form-group">
                <label>Имя пользователя</label>
                <input type="text" id="username" required placeholder="Введите имя пользователя">
            </div>
            
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>
            
            <button type="submit" class="btn-auth">Войти</button>
        </form>
        
        <div class="auth-footer">
            <p>Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
            <p style="margin-top: 10px; font-size: 0.8rem; color: #999;">Тестовый пользователь: user / user123</p>
        </div>
    </div>
</div>

<script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-message');
        
        try {
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username, password})
            });
            
            const data = await response.json();
            
            if (data.success) {
                window.location.href = '/profile';
            } else {
                errorDiv.textContent = data.error;
                errorDiv.style.display = 'block';
            }
        } catch (err) {
            errorDiv.textContent = 'Ошибка соединения';
            errorDiv.style.display = 'block';
        }
    });
</script>
{% endblock %}
